<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>qBittorrent Monitor</title>

<meta name="x-icue-property" content="relayPort"
  data-label="'Relay port (shared TrueNAS relay.py)'"
  data-type="textfield"
  data-default="'8787'" />

<meta name="x-icue-property" content="pollSec"
  data-label="'Refresh interval (seconds)'"
  data-type="slider"
  data-min="2" data-max="30" data-step="1"
  data-default="3" />

<meta name="x-icue-property" content="maxRows"
  data-label="'Torrent rows to show'"
  data-type="slider"
  data-min="1" data-max="15" data-step="1"
  data-default="8" />

<script type="application/json" id="x-icue-groups">
  [
    { "title": "'Connection'", "properties": ["relayPort", "pollSec"], "info": "'Requires relay.py running locally (same relay as the TrueNAS/Minecraft widgets)'" },
    { "title": "'Appearance'", "properties": ["maxRows"] }
  ]
</script>
<style>
  :root {
    --bg: #14181c;
    --panel: #1c2126;
    --border: #2a3138;
    --text: #e7e9ea;
    --text-dim: #8b959d;
    --dl: #4da3ff;
    --dl-bg: #1a2736;
    --up: #6bbf59;
    --up-bg: #22301c;
    --err: #c1554a;
    --err-bg: #302020;
    --accent: #e0a94a;
    --completed: #b388ff;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
    --sans: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
  }

  body {
    font-family: var(--sans);
    color: var(--text);
  }

  /* Built for the Small XENEON Edge slot: 840 x 344px.
     Two-column layout: counters left, torrent list right. */
  .card {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 22px;
    gap: 8px;
  }

  .top-grid {
    display: grid;
    grid-template-columns: 250px 1fr;
    gap: 22px;
    flex: 1;
    min-height: 0;
  }

  .left-col {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
    min-width: 0;
  }

  .right-col {
    display: flex;
    flex-direction: column;
    gap: 7px;
    min-height: 0;
    min-width: 0;
    border-left: 1px solid var(--border);
    padding-left: 22px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .qb-icon {
    width: 30px;
    height: 30px;
    flex-shrink: 0;
    border-radius: 6px;
    background: var(--dl-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dl);
    font-size: 18px;
    font-weight: 700;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .qb-icon.offline { background: var(--err-bg); color: var(--err); }

  .app-name {
    font-weight: 600;
    font-size: 21px;
    letter-spacing: 0.2px;
    white-space: nowrap;
  }

  .status-pill {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.6px;
    padding: 3px 11px;
    border-radius: 999px;
    text-transform: uppercase;
    width: fit-content;
  }
  .status-pill.online { color: var(--up); background: var(--up-bg); }
  .status-pill.offline { color: var(--err); background: var(--err-bg); }

  .counter-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 16px;
  }
  .counter-row .label { color: var(--text-dim); }
  .counter-row .label b { font-family: var(--mono); font-weight: 700; }
  .counter-row .label.dl b { color: var(--dl); }
  .counter-row .label.up b { color: var(--up); }
  .counter-row .value {
    font-family: var(--mono);
    font-weight: 600;
    font-size: 28px;
  }
  .counter-row .speed {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
  }

  .totals-line {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    margin-top: auto;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .section-header .count {
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 700;
    font-size: 14px;
  }

  .torrent-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
    min-width: 0;
  }

  .torrent {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex-shrink: 0;
    min-width: 0;
  }
  .torrent .line {
    display: flex;
    gap: 8px;
    align-items: baseline;
    min-width: 0;
  }
  .torrent .name {
    flex: 1;
    min-width: 0;
    font-size: 14.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .torrent .meta {
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-dim);
    white-space: nowrap;
    flex: 0 1 auto;
    max-width: 48%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* Display categories: downloading (green), completed (purple, overrides
     everything else once a torrent is 100% done -- including a torrent
     that's been explicitly stopped), paused/queued (amber), stopped (red). */
  .torrent .meta.downloading { color: var(--up); }
  .torrent .meta.completed { color: var(--completed); }
  .torrent .meta.paused { color: var(--accent); }
  .torrent .meta.stopped { color: var(--err); }
  .bar {
    height: 4px;
    background: #12151a;
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar > div {
    height: 100%;
    transition: width 0.5s ease;
  }
  .bar > div.downloading { background: var(--up); }
  .bar > div.completed { background: var(--completed); }
  .bar > div.paused { background: var(--accent); }
  .bar > div.stopped { background: var(--err); }

  .torrent-row {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .torrent-row .torrent { flex: 1; min-width: 0; }
  .action-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: #12151a;
    color: var(--text-dim);
    font-size: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .action-btn:active { background: #1c2126; }
  .action-btn.pending { opacity: 0.5; pointer-events: none; }
  .action-btn.resume { color: var(--up); border-color: var(--up); }
  .action-btn.pause { color: var(--dl); border-color: var(--dl); }

  .empty-line {
    font-size: 14px;
    color: var(--text-dim);
    font-style: italic;
  }

  .bottom-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    padding-top: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
  }
  .bottom-bar .err { color: var(--err); }

  .debug-row {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    background: #12151a;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    flex-shrink: 0;
    word-break: break-all;
    white-space: normal;
    line-height: 1.3;
  }
</style>
</head>
<body>

<div class="card">
  <div class="top-grid">
    <div class="left-col">
      <div class="header">
        <div class="qb-icon" id="qbIcon">↓</div>
        <div class="app-name">qBittorrent</div>
      </div>
      <div class="status-pill offline" id="statusPill">Connecting</div>
      <div class="counter-row">
        <span class="label dl"><b>▼</b> Downloading</span>
        <span class="speed" id="dlSpeed"></span>
        <span class="value" id="dlCount">--</span>
      </div>
      <div class="counter-row">
        <span class="label up"><b>▲</b> Seeding</span>
        <span class="speed" id="upSpeed"></span>
        <span class="value" id="upCount">--</span>
      </div>
      <div class="totals-line" id="totalsLine">&nbsp;</div>
    </div>

    <div class="right-col">
      <div class="section-header">
        Active Torrents <span class="count" id="activeCount">0</span>
      </div>
      <div class="torrent-list" id="torrentList">
        <div class="empty-line">Waiting for data…</div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span id="lastUpdated">updated never</span>
    <span class="err" id="errorLine"></span>
  </div>
  <div class="debug-row" id="originDebug">origin: loading…</div>
</div>

<script>
  // ---- Fallback defaults: used only if not set in iCUE's widget settings ----
  const DEF_PORT = 8787;
  const DEF_POLL = 3;
  const DEF_ROWS = 8;
  // ---------------------------------------------------------------------------

  // iCUE injects each x-icue-property as a global variable; read it safely.
  function icueProp(name, fallback) {
    try {
      const v = Function('return typeof ' + name + ' !== "undefined" ? ' + name + ' : undefined')();
      if (v !== undefined && v !== null && v !== "") return v;
    } catch (err) {}
    return fallback;
  }

  function RELAY_URL() { return "http://127.0.0.1:" + Number(icueProp("relayPort", DEF_PORT)) + "/qbit-stats"; }
  function RELAY_ACTION_URL() { return "http://127.0.0.1:" + Number(icueProp("relayPort", DEF_PORT)) + "/qbit-action"; }
  function POLL_MS()   { return Math.max(2, Number(icueProp("pollSec", DEF_POLL))) * 1000; }
  function MAX_ROWS()  { return Number(icueProp("maxRows", DEF_ROWS)); }

  // Torrent classification (dl/up/paused) now happens server-side in relay.py;
  // each row arrives already tagged via its "group" field.

  let lastGoodAt = null;

  function fmtSpeed(bps) {
    if (!bps) return "0 KB/s";
    const kb = bps / 1024;
    if (kb < 1000) return (kb < 10 ? kb.toFixed(1) : Math.round(kb)) + " KB/s";
    const mb = kb / 1024;
    return (mb < 10 ? mb.toFixed(2) : mb.toFixed(1)) + " MB/s";
  }

  function fmtEta(sec) {
    if (sec == null || sec >= 8640000) return "";
    if (sec < 60) return sec + "s";
    if (sec < 3600) return Math.round(sec / 60) + "m";
    if (sec < 86400) return Math.floor(sec / 3600) + "h" + Math.round((sec % 3600) / 60) + "m";
    return Math.round(sec / 86400) + "d";
  }

  function timeAgo(ts) {
    if (!ts) return "never";
    const secs = Math.max(0, Math.floor((Date.now() - ts) / 1000));
    if (secs < 60) return secs + "s ago";
    if (secs < 3600) return Math.floor(secs / 60) + "m ago";
    return Math.floor(secs / 3600) + "h ago";
  }

  function fmtBytes(b) {
    if (!b) return "0 MB";
    const mb = b / 1048576;
    if (mb < 1000) return Math.round(mb) + " MB";
    return (mb / 1024).toFixed(1) + " GB";
  }

  function setStatus(online, errMsg) {
    const pill = document.getElementById("statusPill");
    pill.textContent = online ? "Online" : "Offline";
    pill.className = "status-pill " + (online ? "online" : "offline");
    document.getElementById("qbIcon").className = "qb-icon" + (online ? "" : " offline");
    document.getElementById("errorLine").textContent = errMsg || "";
  }

  function render(torrents, transfer, counts) {
    document.getElementById("dlSpeed").textContent = fmtSpeed(transfer.dl_speed);
    document.getElementById("upSpeed").textContent = fmtSpeed(transfer.up_speed);
    document.getElementById("totalsLine").textContent =
      (counts.total_count ?? torrents.length) + " torrents total \u00b7 session " +
      fmtBytes(transfer.dl_data) + " down / " + fmtBytes(transfer.up_data) + " up";

    const activeTotal = (counts.dl_count ?? 0) + (counts.up_count ?? 0) + (counts.paused_count ?? 0) + (counts.stopped_count ?? 0);
    document.getElementById("activeCount").textContent = activeTotal;

    const listEl = document.getElementById("torrentList");
    listEl.innerHTML = "";

    if (!torrents.length) {
      const e = document.createElement("div");
      e.className = "empty-line";
      e.textContent = "No torrents";
      listEl.appendChild(e);
      return;
    }

    const shown = torrents.slice(0, MAX_ROWS());

    shown.forEach((t) => {
      const runGroup = t.group; // "dl" | "up" | "paused" | "stopped" -- the relay's real running/halted state, used for the action button
      const isComplete = (t.progress || 0) >= 0.999;

      // Display category: completed overrides everything once a torrent
      // is fully downloaded, even if it's also been explicitly stopped.
      let category;
      if (isComplete) category = "completed";
      else if (runGroup === "dl") category = "downloading";
      else if (runGroup === "paused") category = "paused";
      else category = "stopped";

      const pct = Math.min(100, (t.progress || 0) * 100);
      const pctText = pct >= 99.95 ? "100%" : pct.toFixed(1) + "%";

      let arrow, speed, eta;
      if (category === "downloading") {
        arrow = "\u25bc"; speed = fmtSpeed(t.dlspeed); eta = fmtEta(t.eta);
      } else if (category === "completed") {
        arrow = "\u2713"; speed = runGroup === "up" ? fmtSpeed(t.upspeed) : "done"; eta = "";
      } else if (category === "paused") {
        arrow = "\u23f8"; speed = "queued"; eta = "";
      } else {
        arrow = "\u25a0"; speed = "stopped"; eta = "";
      }

      const row = document.createElement("div");
      row.className = "torrent-row";

      const el = document.createElement("div");
      el.className = "torrent";

      const line = document.createElement("div");
      line.className = "line";
      const name = document.createElement("span");
      name.className = "name";
      name.textContent = t.name;
      const meta = document.createElement("span");
      meta.className = "meta " + category;
      meta.textContent = arrow + " " + speed + " \u00b7 " + pctText + (eta ? " \u00b7 " + eta : "");
      line.appendChild(name);
      line.appendChild(meta);

      const bar = document.createElement("div");
      bar.className = "bar";
      const fill = document.createElement("div");
      fill.className = category;
      fill.style.width = pct + "%";
      bar.appendChild(fill);

      el.appendChild(line);
      el.appendChild(bar);
      row.appendChild(el);

      // Button reflects the torrent's real running state, independent of
      // display color -- a stopped-but-complete torrent shows purple text
      // AND a resume button, since it genuinely is stopped.
      if (t.hash) {
        const isHalted = runGroup === "stopped";
        const btn = document.createElement("div");
        btn.className = "action-btn " + (isHalted ? "resume" : "pause");
        btn.textContent = isHalted ? "\u25b6" : "\u23f8";
        btn.title = isHalted ? "Resume" : "Pause";
        btn.onclick = () => sendTorrentAction(t.hash, isHalted ? "resume" : "pause", btn);
        row.appendChild(btn);
      }

      listEl.appendChild(row);
    });

    if (torrents.length > shown.length) {
      const more = document.createElement("div");
      more.className = "empty-line";
      more.textContent = "+" + (torrents.length - shown.length) + " more";
      listEl.appendChild(more);
    }
  }

  async function sendTorrentAction(hash, action, btnEl) {
    btnEl.classList.add("pending");
    try {
      const r = await fetch(RELAY_ACTION_URL(), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ hash, action }),
      });
      const data = await r.json();
      if (!data.started) {
        setStatus(true, "action failed: " + (data.error || "unknown error"));
      }
    } catch (err) {
      setStatus(true, "couldn't reach relay to send action");
    }
    // Next poll (within POLL_MS) will reflect the real new state either way.
    poll();
  }

  async function poll() {
    try {
      const r = await fetch(RELAY_URL(), { cache: "no-store" });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      if (data.enabled === false) throw new Error("qbittorrent.enabled is false in config.json");
      if (!data.online) throw new Error(data.error || "relay reports qBittorrent offline");

      render(
        data.torrents || [],
        { dl_speed: data.dl_speed, up_speed: data.up_speed, dl_data: data.dl_data, up_data: data.up_data },
        { dl_count: data.dl_count, up_count: data.up_count, paused_count: data.paused_count, stopped_count: data.stopped_count, total_count: data.total_count }
      );
      document.getElementById("dlCount").textContent = data.dl_count ?? "--";
      document.getElementById("upCount").textContent = data.up_count ?? "--";
      lastGoodAt = Date.now();
      setStatus(true, "");
    } catch (err) {
      const hint = /failed to fetch/i.test(err.message)
        ? "can't reach relay on 127.0.0.1 \u2014 is relay.py running?"
        : err.message;
      setStatus(false, hint);
    }
    document.getElementById("lastUpdated").textContent = "updated " + timeAgo(lastGoodAt);
  }

  document.getElementById("originDebug").textContent =
    "relay: " + RELAY_URL();

  let pollTimer = null;

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    poll();
    pollTimer = setInterval(poll, POLL_MS());
  }

  // iCUE lifecycle: start when initialized, restart when the user
  // changes anything in the widget's settings panel.
  icueEvents = {
    onICUEInitialized: startPolling,
    onDataUpdated: startPolling,
  };

  if (typeof iCUE_initialized !== "undefined" && iCUE_initialized) startPolling();
  // Fallback so it also runs in a plain browser preview
  setTimeout(function () { if (!pollTimer) startPolling(); }, 1500);
</script>

</body>
</html>
